name: Proxy Download PMOS

on:
  push:
    paths:
      - '.github/workflows/proxy-download.yml'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Upload
        run: |
          BASE_URL="https://images.postmarketos.org/bport/v25.12/pine64-pinephone/console/"
          echo "Scraping $BASE_URL for latest build..."
          # Find the latest date-formatted directory (e.g., 20260601-1052/)
          LATEST_DIR=$(curl -s "$BASE_URL" | grep -oE '[0-9]{8}-[0-9]{4}/' | sort -V | tail -n 1)
          FULL_URL="${BASE_URL}${LATEST_DIR}"
          # Find the .img.xz file in that directory
          FILE=$(curl -s "$FULL_URL" | grep -oE '[^"]+\.img\.xz' | head -n 1)
          
          echo "Downloading ${FULL_URL}${FILE}..."
          curl -f -L -O "${FULL_URL}${FILE}"
          echo "Download complete."
          ls -lh
          
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: pmos-pinephone-console
          path: "*.img.xz"
          retention-days: 1
