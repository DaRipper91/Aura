name: Proxy Download PMOS

on:
  push:
    paths:
      - '.github/workflows/proxy-download.yml'
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and Upload
        run: |
          # Use the exact stable 2026-06 service pack link
          URL="https://images.postmarketos.org/bport/v25.12/pine64-pinephone/console/20260601-1052/20260601-1052-postmarketos-v25.12-console-pine64-pinephone.img.xz"
          echo "Downloading $URL..."
          curl -f -L -O "$URL"
          echo "Download complete."
          ls -lh
          
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: pmos-pinephone-console
          path: 20260601-1052-postmarketos-v25.12-console-pine64-pinephone.img.xz
          retention-days: 1
