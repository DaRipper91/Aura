name: "🛡️ Jules // Sentinel Security Sweep"

on:
  schedule:
    - cron: '0 21 * * *' # Nightly at 4:00 PM CDT
  workflow_dispatch:

jobs:
  summon-jules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: "Summoning Sentinel Agent"
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          echo "Summoning Jules (Sentinel) for Linux sweep..."
          python3 aura/core/jules/sentinel.py
          echo "Summoning Jules (Sentinel) for Android sweep..."
          python3 aura/core/jules/android_sentinel.py
