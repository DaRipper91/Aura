name: Build Aura Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2.1

      - name: Bundle Models into Assets
        run: |
          mkdir -p mobile/android/app/src/main/assets/models
          # PHI3_MINI remains as the lightweight on-device fallback
          curl -L "https://huggingface.co/google/phi-3-mini-4k-instruct-tflite/resolve/main/phi-3-mini-4k-instruct.bin" -o "mobile/android/app/src/main/assets/models/PHI3_MINI.bin"

      - name: Build Debug APK with Chaquopy
        run: chmod +x gradlew && ./gradlew assembleDebug
        working-directory: mobile/android

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: aura-apks
          path: mobile/android/app/build/outputs/apk/**/debug/*.apk

      - name: Release APKs
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: mobile/android/app/build/outputs/apk/**/debug/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
