name: Build Aura Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'mobile/android/**'
      - 'python/**'
      - '.github/workflows/android.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2.1

      - name: Bundle Models into Assets
        run: |
          mkdir -p mobile/android/app/src/main/assets/models
          # PHI3_MINI remains as the lightweight on-device fallback
          curl -L "https://huggingface.co/google/phi-3-mini-4k-instruct-tflite/resolve/main/phi-3-mini-4k-instruct.bin" -o "mobile/android/app/src/main/assets/models/PHI3_MINI.bin"
          # Whisper Tiny for local STT
          curl -L "https://huggingface.co/litert-community/whisper-tiny-en-tflite/resolve/main/whisper-tiny-en.tflite" -o "mobile/android/app/src/main/assets/models/whisper_tiny_en.tflite"

      - name: Build Debug APK with Chaquopy
        run: chmod +x gradlew && ./gradlew assembleDebug
        working-directory: mobile/android

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aura-apks
          path: mobile/android/app/build/outputs/apk/**/debug/*.apk

      - name: Update Rolling Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile/android/app/build/outputs/apk/pixel/debug/app-pixel-debug.apk
            mobile/android/app/build/outputs/apk/samsung/debug/app-samsung-debug.apk
          tag_name: rolling-release
          name: "Aura // Latest Rolling Build"
          body: "Automated build from branch: ${{ github.ref_name }} (Commit: ${{ github.sha }})"
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Versioned Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mobile/android/app/build/outputs/apk/pixel/debug/app-pixel-debug.apk
            mobile/android/app/build/outputs/apk/samsung/debug/app-samsung-debug.apk
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
