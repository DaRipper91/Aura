name: "⚡ Jules // Bolt Performance Profiling"

on:
  schedule:
    - cron: '0 21 * * *' # Nightly at 4:00 PM CDT
  workflow_dispatch:

jobs:
  summon-jules:
    runs-on: ubuntu-latest
    steps:
      - name: "Summoning Bolt Agent"
        run: |
          export PYTHONPATH=$PYTHONPATH:.
          echo "Summoning Jules (Bolt) for Linux profiling..."
          python3 aura/core/jules/bolt.py
          echo "Summoning Jules (Bolt) for Android profiling..."
          python3 aura/core/jules/android_bolt.py
