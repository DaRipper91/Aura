name: Build Aura Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
    paths:
      - 'python/**'
      - 'main.py'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 requests pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --paths python --add-data "python/aura/ui/icon.svg;aura/ui" --add-data "python/aura/ui/fonts/*.ttf;aura/ui/fonts" --name Aura_v1.0.5_Lite main.py

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/Aura_v1.0.5_Lite.exe
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
