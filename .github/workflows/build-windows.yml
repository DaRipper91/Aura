name: Build Aura Windows EXE

on:
  push:
    branches: [ main ]
    paths:
      - 'python/**'
      - 'main.py'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 requests pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        # --onefile: Bundle everything into a single EXE
        # --windowed: No console window
        # --icon: Use the icon if available
        # --paths: Add the python directory so PyInstaller can find the modules
        pyinstaller --onefile --windowed --paths python --name Aura_v1.0.5_Lite main.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-windows-exe
        path: dist/Aura_v1.0.5_Lite.exe
