name: Build Aura Windows EXE

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
    paths:
      - 'python/**'
      - '.github/workflows/build-windows.yml'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 requests pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --onefile --windowed --paths python --add-data "python/aura/ui/icon.svg;aura/ui" --add-data "python/aura/ui/fonts/*.ttf;aura/ui/fonts" --name Aura_v1.0.6_Lite python/main.py

    - name: Setup NSIS
      run: |
        choco install nsis -y
        echo "C:\Program Files (x86)\NSIS" >> $GITHUB_PATH

    - name: Build Installer with NSIS
      run: |
        makensis installer.nsi

    - name: Update Rolling Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/Aura_v1.0.6_Lite.exe
          dist/Aura_Setup_v1.0.6.exe
        tag_name: rolling-release
        name: "Aura // Latest Rolling Build"
        body: "Automated build from branch: ${{ github.ref_name }} (Commit: ${{ github.sha }})"
        generate_release_notes: true
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Versioned Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/Aura_v1.0.5_Lite.exe
          dist/Aura_Setup_v1.0.5.exe
        tag_name: ${{ github.ref }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
