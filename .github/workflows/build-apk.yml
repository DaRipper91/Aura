name: Build Aura Android APK

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
    paths:
      - 'android/**'
      - 'aura_core/**'
      - 'aura/ui/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2.1

      - name: Bundle Model into Assets
        run: |
          mkdir -p android/app/src/main/assets/models
          curl -L "https://huggingface.co/litert-community/Qwen2.5-1.5B-Instruct/resolve/main/Qwen2.5-1.5B-Instruct_seq128_q8_ekv1280.task" -o "android/app/src/main/assets/models/QWEN_1.5B.bin"

      - name: Build Debug APK with Chaquopy
        run: gradle assembleDebug
        working-directory: ./android

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: Aura v${{ github.ref_name }}
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
