name: Build DA-HP Arch ISO

on:
  push:
    branches: [ main ]
    paths:
      - 'DA-HP-ISO/**'
      - 'da-hp-bootstrap.sh'
      - '.github/workflows/da-hp-iso.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: "--privileged"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm archiso libisoburn mtools squashfs-tools

      - name: Inject Tailscale Auth Key into Bootstrap
        env:
          TS_AUTH_KEY: ${{ secrets.TS_AUTH_KEY }}
        if: env.TS_AUTH_KEY != ''
        run: |
          # Bake the secret into the bootstrap script
          sed -i "s/\$TS_AUTH_KEY/${TS_AUTH_KEY}/g" da-hp-bootstrap.sh
          
          # Copy the script into the ISO filesystem
          mkdir -p DA-HP-ISO/airootfs/usr/local/bin
          cp da-hp-bootstrap.sh DA-HP-ISO/airootfs/usr/local/bin/da-hp-bootstrap.sh
          chmod +x DA-HP-ISO/airootfs/usr/local/bin/da-hp-bootstrap.sh

      - name: Prepare UEFI Bootloader Config
        run: |
          mkdir -p DA-HP-ISO/efiboot/loader/entries
          cat <<EOT > DA-HP-ISO/efiboot/loader/loader.conf
          timeout 3
          default archiso-x86_64-linux.conf
          EOT
          
          cat <<EOT > DA-HP-ISO/efiboot/loader/entries/archiso-x86_64-linux.conf
          title    Aura Logic Hub Install (x86_64, UEFI)
          linux    /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-zen
          initrd   /%INSTALL_DIR%/boot/intel-ucode.img
          initrd   /%INSTALL_DIR%/boot/x86_64/initramfs-linux-zen.img
          options  archisobasedir=%INSTALL_DIR% archisolabel=AURA_LOGIC copytoram=n
          EOT

      - name: Build ISO
        run: |
          mkdir -p work out
          mkarchiso -v -w ./work -o ./out ./DA-HP-ISO

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-logic-hub-iso
          path: out/*.iso

      - name: Update Rolling Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          files: out/*.iso
          tag_name: rolling-release
          name: "Aura // Latest Rolling Build"
          body: "Automated DA-HP ISO build from branch: ${{ github.ref_name }} (Commit: ${{ github.sha }})"
          generate_release_notes: true
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
