name: Build Aura Xbox MSIX

on:
  push:
    branches: [ main ]
    paths:
      - 'python/**'
      - 'main.py'
      - 'xbox/**'
      - '.github/workflows/build-xbox.yml'

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PySide6 requests pyinstaller

    - name: Build EXE for Xbox
      run: |
        # Build as a folder first to bundle with manifest
        pyinstaller --onedir --windowed --name Aura_v1.0.5_Xbox main.py

    - name: Prepare MSIX Package
      shell: pwsh
      run: |
        mkdir package
        cp -r dist/Aura_v1.0.5_Xbox/* package/
        cp xbox/AppxManifest.xml package/
        
        # Create valid PNG placeholders
        mkdir package/Assets
        Add-Type -AssemblyName System.Drawing
        $bmp = New-Object System.Drawing.Bitmap(150, 150)
        $g = [System.Drawing.Graphics]::FromImage($bmp)
        $g.Clear([System.Drawing.Color]::FromArgb(15, 15, 15))
        $bmp.Save("package/Assets/Square150x150Logo.png", [System.Drawing.Imaging.ImageFormat]::Png)
        $bmp.Save("package/Assets/StoreLogo.png", [System.Drawing.Imaging.ImageFormat]::Png)
        $bmp.Save("package/Assets/Square44x44Logo.png", [System.Drawing.Imaging.ImageFormat]::Png)
        $bmp.Save("package/Assets/Wide310x150Logo.png", [System.Drawing.Imaging.ImageFormat]::Png)
        $bmp.Save("package/Assets/SplashScreen.png", [System.Drawing.Imaging.ImageFormat]::Png)

    - name: Create and Sign MSIX
      shell: pwsh
      run: |
        # 1. Find Tools
        $sdkPath = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*" | Sort-Object Name -Descending | Select-Object -First 1
        $makeAppx = Join-Path $sdkPath.FullName "x64\makeappx.exe"
        $signTool = Join-Path $sdkPath.FullName "x64\signtool.exe"
        
        # 2. Pack
        & $makeAppx pack /d package /p Aura_v1.0.5_Xbox_Unsigned.msix /v

        # 3. Create Self-Signed Cert
        $certPassword = "AuraPassword123"
        $secPassword = ConvertTo-SecureString -String $certPassword -Force -AsPlainText
        $cert = New-SelfSignedCertificate -Type Custom -Subject "CN=DaRipper91" -KeyUsage DigitalSignature -FriendlyName "Aura Dev Cert" -CertStoreLocation "Cert:\CurrentUser\My" -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        
        $pfxPath = "AuraDevCert.pfx"
        Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $secPassword

        # 4. Sign
        & $signTool sign /fd SHA256 /a /f $pfxPath /p $certPassword Aura_v1.0.5_Xbox_Unsigned.msix
        mv Aura_v1.0.5_Xbox_Unsigned.msix Aura_v1.0.5_Xbox.msix

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: aura-xbox-msix
        path: Aura_v1.0.5_Xbox.msix
